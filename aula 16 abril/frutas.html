
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cards de Frutas</title>
<link rel="stylesheet" href="frutas.css">
</head>
<body>

<h1 class="titulo">🍎 Alimentação Saudável</h1>

<div class="container">

<div class="card card-grande">
<img src="https://static.vecteezy.com/system/resources/previews/029/228/390/non_2x/apple-transparent-background-free-png.png" alt="Maçã">
<div class="texto-card">
<h2>Maçã</h2>
<p>52 kcal</p>
</div>
</div>

<div class="card card-grande">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Banana.png/1280px-Banana.png" alt="Banana">
<div class="texto-card">
<h2>Banana</h2>
<p>89 kcal</p>
</div>
</div>

<div class="card card-grande">
<img src="https://png.pngtree.com/png-clipart/20241118/original/pngtree-realictic-delicious-orange-fruit-png-image_17191993.png" alt="Laranja">
<div class="texto-card">
<h2>Laranja</h2>
<p>47 kcal</p>
</div>
</div>

<div class="card card-grande">
<img src="https://png.pngtree.com/png-clipart/20241215/original/pngtree-strawberry-png-image_17861728.png" alt="Morango">
<div class="texto-card">
<h2>Morango</h2>
<p>32 kcal</p>
</div>
</div>

<div class="card destaque">
<div class="icone-destaque">♡</div>
<div class="texto-destaque">
<h2>Cuide do seu corpo!</h2>
<p>Uma alimentação saudável é o primeiro passo para uma vida melhor.</p>
</div>
</div>

<div class="card card-pequeno">
<img src="https://img.freepik.com/fotos-gratis/fruta-abacaxi_1203-7746.jpg?semt=ais_hybrid&w=740&q=80" alt="Abacaxi">
<h2>Abacaxi</h2>
<p>50 kcal</p>
</div>

<div class="card card-pequeno">
<img src="https://www.em.com.br/emfoco/wp-content/uploads/2026/02/Gemini_Generated_Image_waph8xwaph8xwaph-1.png" alt="Melancia">
<h2>Melancia</h2>
<p>30 kcal</p>
</div>

<div class="card card-pequeno">
<img src="https://img.freepik.com/fotos-gratis/de-fruta-natural-colheita-videira-saudavel_1203-5965.jpg?semt=ais_hybrid&w=740&q=80" alt="Uva">
<h2>Uva</h2>
<p>69 kcal</p>
</div>

<div class="card card-pequeno">
<img src="https://png.pngtree.com/png-clipart/20250501/original/pngtree-a-mango-realistic-image-png-image_20926014.png" alt="Manga">
<h2>Manga</h2>
<p>60 kcal</p>
</div>

</div>

</body>
</html>
